name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-14]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.3'
          host: ${{ runner.os == 'macOS' && 'mac' || 'linux' }}
          target: 'desktop'
          arch: ${{ runner.os == 'macOS' && 'clang_64' || 'gcc_64' }}
          modules: ''
          cache: true

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            ccache \
            libgl1-mesa-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libxcb-cursor-dev \
            xvfb

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: brew install ninja ccache

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DLUMEN_BUILD_TESTS=ON \
            -DLUMEN_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: xvfb-run -a ctest --output-on-failure

      - name: Run tests (macOS)
        if: runner.os == 'macOS'
        working-directory: build
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --output-on-failure
